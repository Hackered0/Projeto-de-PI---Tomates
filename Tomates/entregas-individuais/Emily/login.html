<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TomatoMetrics - Login</title>
    <link rel="stylesheet" href="style.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="cadastro.html">
</head>
<body>
    <div class="main-login">
        <div class="left-login">
            <h1>Cultive sua conexão<br>E entre para o nosso time</h1>
            <img src="mobile-login-animate.svg" class="image" alt="Ilustração de Login">
        </div>

        <div class="right-login">
            <div class="card-login">
                <h1>LOGIN</h1>
                
                <div class="textfield">
                    <label for="usuario">Usuário</label>
                    <div class="input-container">
                        <i class='bx bx-user'></i>
                        <input type="text" name="usuario" placeholder="Username" required>
                    </div>
                </div>

                <div class="textfield">
                    <label for="senha">Senha</label>
                    <div class="input-container">
                        <i class='bx bx-lock-alt'></i>
                        <input type="password" name="senha" placeholder="Password" required>
                    </div>
                </div>

                <div class="remember-forgot">
                    <label><input type="checkbox"> Lembrar de mim</label>
                    <a href="#">Esqueceu a senha?</a>
                </div>

                <button type="submit" class="btn-login">Acessar Estufa</button>

                <div class="register">
                    <p>Não tem uma conta? <a href="#">Cadastre-se</a></p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
