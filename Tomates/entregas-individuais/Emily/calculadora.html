<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora ROI - Tomateiro</title>
</head>
<body>
    
    <h1>Calculadora de ROI - Tomateiro (Campo Aberto)</h1>
    
    <p>Área de Plantio (m²):</p>
    <input type="number" id="ipt_area" placeholder="Ex: 1000"><br>
    
    <p>Produção Mensal Média (kg):</p>
    <input type="number" id="ipt_producao" placeholder="Ex: 1250"><br>
    
    <p>Preço de Venda Médio (R$ por kg):</p>
    <input type="number" id="ipt_preco" placeholder="Ex: 5.00"><br>
    
    <p>Gasto Mensal Médio com Agrotóxicos (R$):</p>
    <input type="number" id="ipt_custoAgro" placeholder="Ex: 500"><br><br>

    <button onclick="calcularROIAnual()">Analisar Impacto Financeiro</button> 
    
    <div id="div_mensagem"></div>
</body>
</html>
    <script>
    function calcularROIAnual() {
       
        let prodMensal = Number(ipt_producao.value);
        let preco = Number(ipt_preco.value);
        let agroMensal = Number(ipt_custoAgro.value);
        
        div_mensagem.innerHTML = "";

        if (prodMensal <= 0 || preco <= 0 || agroMensal <= 0) {
            alert("Por favor, preencha todos os campos corretamente.");
            return;
        }

        // --- CÁLCULOS ---
        // Prejuízo que ele tem hoje (35% da produção + 25% de desperdício de agro)
        let perdaProducaoAno = ((prodMensal * 0.35) * preco) * 12;
        let desperdicioAgroAno = (agroMensal * 0.25) * 12;
        let prejuizoTotalAno = perdaProducaoAno + desperdicioAgroAno;
        let gastoAgroAno = agroMensal  * 12;

        // Lucro adicional (é o prejuízo que deixa de existir)
        let lucroExtraMes = prejuizoTotalAno / 12;

        
        div_mensagem.innerHTML = `
            <h2>Relatório de Perdas vs. Ganhos (1 Ano)</h2>

            <p style="color: red;">
                <b>Prejuízo Acumulado (Sem o Sensor):</b><br>
                R$ ${prejuizoTotalAno.toFixed(2)} jogados fora por ano com desperdício e morte de plantas.
            </p>

            <p style="color: blue;">
                <b>Economia em Agrotóxicos com nosso sensor:</b><br>
                R$ ${desperdicioAgroAno.toFixed(2)} economizados em 12 meses.
            </p>

            <p style="color: red;">
                <b>Gasto anual com Agrotóxicos sem nosso sensor:</b><br>
                R$ ${gastoAgroAno.toFixed(2)} de prejuízo com agrotóxico.
            </p>

            <p style="color: green;">
                <b>Lucro Adicional com Nosso Sensor:</b><br>
                + R$ ${lucroExtraMes.toFixed(2)} de faturamento extra todo mês.
            </p>

            <hr>

            <p style="color: #1b5e20; font-size: 22px;">
                <b>Resultado Final em 1 Ano:</b><br>
                <b>R$ ${prejuizoTotalAno.toFixed(2)}</b> de lucro recuperado!
            </p>

            <p style="font-size: 14px; color: #444; border-left: 4px solid #ffca28; padding-left: 10px;">
                <i><b>Nota:</b> Cada dia sem o sensor custa R$ ${(prejuizoTotalAno / 365).toFixed(2)} para o seu bolso. 
                Quanto tempo mais você vai aceitar perder esse valor?</i>
            </p>
 
            <p style="font-size: 14px; color: #444; border-left: 4px solid #ffca28; padding-left: 10px;">
            <i><b>35% de Recuperação:</b> Estimativa de redução de perdas na colheita através do monitoramento de temperatura (evita aborto de flores) e umidade do solo (evita Fundo Preto).</i>
            </p>

            <p style="font-size: 14px; color: #444; border-left: 4px solid #ffca28; padding-left: 10px;">
            <i><b> 25% de Economia:</b> Redução no gasto com defensivos agrícolas ao utilizar o sensor de umidade do ar, aplicando produtos apenas quando as condições climáticas favorecem pragas.</i>
            </p> `;
    }
    </script>
